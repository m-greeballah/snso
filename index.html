<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>SNSO AI Assistant - Demo</title>
<style>
body{
  font-family: 'Segoe UI', Arial;
  background:#0f172a;
  color:#e2e8f0;
  margin:0;
}
.header{
  background:linear-gradient(135deg,#1e1b4b,#312e81,#1e3a5f);
  padding:30px;
}
.container{
  max-width:900px;
  margin:auto;
}
h1{margin:0;color:white}
.search-box{
  margin-top:20px;
  display:flex;
  gap:10px;
}
input{
  flex:1;
  padding:14px;
  border-radius:10px;
  border:2px solid #6366f1;
  background:#1e293b;
  color:white;
}
button{
  padding:14px 24px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  color:white;
  font-weight:bold;
  cursor:pointer;
}
.answer{
  margin-top:25px;
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  border:1px solid #6366f1;
}
.result-card{
  margin-top:10px;
  padding:15px;
  background:#1e293b;
  border:1px solid #334155;
  border-radius:10px;
}
.footer{
  margin-top:40px;
  text-align:center;
  padding:20px;
  color:#64748b;
}
.example{
  margin-top:15px;
}
.example span{
  background:#334155;
  padding:6px 12px;
  border-radius:20px;
  margin:5px;
  cursor:pointer;
  display:inline-block;
  font-size:13px;
}
</style>
</head>
<body>

<div class="header">
<div class="container">
<h1>🤖 SNSO AI Assistant</h1>
<p>المساعد الذكي لنظام سنسو لإدارة الموارد - نسخة تجريبية</p>

<div class="search-box">
<input type="text" id="query" placeholder="اكتب سؤالك هنا... مثال: كيف أضيف مستخدم جديد؟">
<button onclick="search()">بحث</button>
</div>

<div class="example">
<span onclick="setExample('كيف أضيف مستخدم جديد؟')">كيف أضيف مستخدم جديد؟</span>
<span onclick="setExample('كيف أضبط مخطط إجراء؟')">كيف أضبط مخطط إجراء؟</span>
<span onclick="setExample('كيف أوافق على طلب إجازة؟')">كيف أوافق على طلب إجازة؟</span>
</div>

</div>
</div>

<div class="container">

<div id="answer"></div>
<div id="results"></div>

<div class="footer">
© 2026 SNSO ERP - Demo Version 1.0
</div>

</div>

<script>
const documents = [
{
title:"إدارة المستخدمين",
content:"إدارة المستخدمين تتيح إضافة مستخدم جديد، تغيير حالة الحساب، إعادة ضبط بيانات الدخول، وتصنيف المستخدمين."
},
{
title:"ضبط المخططات",
content:"ضبط المخططات يتم من إدارة التقنية ثم منظومة الإجراءات ثم ضبط المخططات. يمكن إضافة أو تعديل أو حذف مخطط."
},
{
title:"إجراءات طلب إجازة",
content:"طلب الإجازة يمر بثلاث مراحل: إنشاء الطلب، الاعتماد أو الرفض، تنفيذ التوصيات وخصم الرصيد."
},
{
title:"ضبط بيانات الدخول",
content:"يمكن تعديل رقم الجوال والبريد الإلكتروني من خلال إجراء ضبط بيانات الدخول في إدارة التقنية."
}
];

function setExample(text){
document.getElementById("query").value = text;
search();
}

function search(){
const query = document.getElementById("query").value.trim();
const answerDiv = document.getElementById("answer");
const resultsDiv = document.getElementById("results");

answerDiv.innerHTML="";
resultsDiv.innerHTML="";

if(!query) return;

let keywords = query.split(" ").filter(w=>w.length>2);

let matches = documents.filter(doc =>
keywords.some(word =>
doc.title.includes(word) || doc.content.includes(word)
)
);

if(matches.length===0){
answerDiv.innerHTML="<div class='answer'>لم يتم العثور على نتائج مطابقة.</div>";
return;
}

answerDiv.innerHTML="<div class='answer'>بناءً على قاعدة المعرفة، هذه النتائج المرتبطة بسؤالك:</div>";

matches.forEach(doc=>{
resultsDiv.innerHTML += `
<div class="result-card">
<strong>${doc.title}</strong>
<p>${doc.content}</p>
</div>
`;
});
}
</script>

</body>
</html>
